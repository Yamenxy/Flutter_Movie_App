name: movies_app
description: A minimal Flutter project scaffold.
publish_to: 'none'
version: 0.0.1
environment:
  sdk: ">=2.18.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^4.4.0
  google_sign_in: ^6.1.0
  flutter_svg: ^2.0.7
  vector_graphics: ^1.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  flutter_gen_runner: ^4.1.2
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto_SemiCondensed-Medium.ttf
          weight: 400

flutter_gen:
  output: lib/core/gen/ # Optional (default: lib/gen/)
  # line_length: 80 # Optional

  # Optional
  integrations:
    image: true
    flutter_svg: true