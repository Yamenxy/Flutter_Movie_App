publish_to: 'none'
version: 0.0.1
environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  firebase_auth: ^4.4.0
  google_sign_in: ^6.1.0
  flutter_svg: ^2.0.7
